<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智麻局：AI陪你打麻将</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a5c36; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; overflow: hidden; height: 100vh; user-select: none; }

/* ===== 启动界面 ===== */
#splash {
  position: fixed; inset: 0; z-index: 9999;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: #0b0b0b;
  overflow: hidden;
}
#splash .bg {
  position: absolute; inset: 0;
  background: url('hero.png') center/cover no-repeat;
  filter: brightness(0.45) blur(4px);
  transform: scale(1.1);
}
#splash .overlay {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.7) 100%);
}
#splash .content {
  position: relative; z-index: 2;
  display: flex; flex-direction: column; align-items: center;
  animation: splashFadeIn 1.2s ease-out;
}
#splash .logo-icon {
  width: 100px; height: 100px;
  background: radial-gradient(circle, #2ecc71 0%, #0a5c36 100%);
  border-radius: 20px; border: 3px solid rgba(241,196,15,0.6);
  display: flex; align-items: center; justify-content: center;
  font-size: 50px;
  box-shadow: 0 0 40px rgba(46,204,113,0.3), 0 8px 30px rgba(0,0,0,0.4);
  margin-bottom: 24px;
}
#splash .title {
  font-size: 52px; font-weight: 900;
  background: linear-gradient(180deg, #ffe082 0%, #f9a825 40%, #e65100 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 6px;
  margin-bottom: 8px;
  filter: drop-shadow(0 2px 8px rgba(249,168,37,0.4));
}
#splash .subtitle {
  font-size: 20px; color: rgba(255,255,255,0.75);
  letter-spacing: 8px; margin-bottom: 50px;
  font-weight: 300;
}
#splash .start-btn {
  padding: 16px 64px;
  font-size: 20px; font-weight: bold; letter-spacing: 4px;
  color: #fff;
  background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 4px 20px rgba(46,204,113,0.4), 0 0 60px rgba(46,204,113,0.15);
  animation: btnPulse 2.5s ease-in-out infinite;
}
#splash .start-btn:hover {
  transform: scale(1.06);
  box-shadow: 0 6px 30px rgba(46,204,113,0.6), 0 0 80px rgba(46,204,113,0.25);
  background: linear-gradient(135deg, #3ddc84 0%, #2ecc71 100%);
}
#splash .start-btn:active { transform: scale(0.97); }
#splash .footer-text {
  position: absolute; bottom: 30px;
  font-size: 12px; color: rgba(255,255,255,0.3); letter-spacing: 2px;
}
#splash .tagline {
  font-size: 13px; color: rgba(255,255,255,0.4);
  margin-bottom: 16px; letter-spacing: 2px;
}
@keyframes splashFadeIn {
  0% { opacity: 0; transform: translateY(30px); }
  100% { opacity: 1; transform: translateY(0); }
}
@keyframes btnPulse {
  0%,100% { box-shadow: 0 4px 20px rgba(46,204,113,0.4), 0 0 60px rgba(46,204,113,0.15); }
  50% { box-shadow: 0 4px 30px rgba(46,204,113,0.6), 0 0 80px rgba(46,204,113,0.3); }
}
#splash.fade-out {
  animation: splashOut 0.6s ease-in forwards;
}
@keyframes splashOut {
  0% { opacity: 1; }
  100% { opacity: 0; pointer-events: none; }
}
#game.hidden-game { display: none; }
#game { width: 100vw; height: 100vh; position: relative; display: flex; align-items: center; justify-content: center; }
.table { width: 900px; height: 660px; background: radial-gradient(ellipse at center, #1a8a50 0%, #0a5c36 100%); border-radius: 20px; position: relative; box-shadow: inset 0 0 60px rgba(0,0,0,0.3), 0 0 30px rgba(0,0,0,0.5); border: 3px solid #0d7a42; }

/* 牌的样式 */
.tile { width: 40px; height: 54px; background: linear-gradient(180deg, #fff 0%, #e8e0d0 100%); border: 1px solid #999; border-radius: 4px; display: inline-block; cursor: default; position: relative; box-shadow: 1px 2px 3px rgba(0,0,0,0.3); margin: 1px; flex-shrink: 0; overflow: hidden; padding: 2px; }
.tile.clickable { cursor: pointer; transition: transform 0.1s; }
.tile.clickable:hover { transform: translateY(-8px); box-shadow: 1px 6px 8px rgba(0,0,0,0.4); }
.tile.selected { transform: translateY(-12px); box-shadow: 0 0 10px #f1c40f; border-color: #f1c40f; }
.tile.back { background: linear-gradient(135deg, #1a5276 0%, #2471a3 50%, #1a5276 100%); border-color: #154360; }
.tile.back .tf { display: none; }
.tile.small { width: 28px; height: 38px; }
.tile.tiny { width: 22px; height: 30px; }

/* 牌面文字 */
.tf { display:flex; flex-direction:column; align-items:center; justify-content:center; width:100%; height:100%; gap:0; font-family:"PingFang SC","Heiti SC","Noto Sans SC","Microsoft YaHei",sans-serif; }
.tf .tn { font-size:20px; font-weight:900; line-height:1.1; }
.tf .ts { font-size:14px; font-weight:900; line-height:1.1; }
.tf.s0 { color:#c0392b; }
.tf.s1 { color:#27ae60; }
.tf.s2 { color:#222; }
.tile.small .tf .tn { font-size:14px; }
.tile.small .tf .ts { font-size:10px; }
.tile.tiny .tf .tn { font-size:11px; }
.tile.tiny .tf .ts { font-size:8px; }

/* 玩家区域 */
.player-area { position: absolute; display: flex; align-items: center; }
.player-bottom { bottom: 10px; left: 50%; transform: translateX(-50%); flex-direction: column; align-items: center; }
.player-top { top: 10px; left: 50%; transform: translateX(-50%); flex-direction: column; align-items: center; }
.player-left { left: 10px; top: 50%; transform: translateY(-50%); flex-direction: column; align-items: center; }
.player-right { right: 10px; top: 50%; transform: translateY(-50%); flex-direction: column; align-items: center; }

.hand { display: flex; align-items: flex-end; gap: 1px; }
.hand-side { display: flex; flex-direction: column; gap: 1px; }

.melds { display: flex; gap: 6px; margin: 0 10px; }
.melds-side { display: flex; flex-direction: column; gap: 4px; }
.meld { display: flex; gap: 1px; }
.meld-side { display: flex; flex-direction: column; gap: 1px; }

.player-info { color: #fff; font-size: 13px; padding: 4px 10px; background: rgba(0,0,0,0.4); border-radius: 10px; margin: 4px; white-space: nowrap; text-align: center; }
.player-info .name { font-weight: bold; }
.player-info .score { color: #f1c40f; margin-left: 6px; }
.missing-icon { display: inline-block; font-size: 10px; color: #e74c3c; margin-left: 4px; }

/* 出牌区 */
.discard-area { position: absolute; display: flex; flex-wrap: wrap; }
.discard-bottom { bottom: 140px; left: 50%; transform: translateX(-50%); width: 280px; justify-content: flex-start; }
.discard-top { top: 110px; left: 50%; transform: translateX(-50%); width: 280px; justify-content: flex-start; }
.discard-left { left: 80px; top: 50%; transform: translateY(-50%); flex-direction: column; flex-wrap: wrap; max-height: 400px; }
.discard-right { right: 80px; top: 50%; transform: translateY(-50%); flex-direction: column; flex-wrap: wrap; max-height: 400px; }
.discard-area .tile { margin: 1px; }

/* 旋转牌面：上家顺时针90° 下家逆时针90° */
.tile.rot-cw { transform: rotate(90deg); margin: -3px 5px; }
.tile.rot-ccw { transform: rotate(-90deg); margin: -3px 5px; }

/* 出牌指示箭头 - 动态定位到出的那张牌顶部 */
.turn-arrow { position: absolute; font-size: 20px; color: #f1c40f; z-index: 10; pointer-events: none; text-shadow: 0 0 10px rgba(241,196,15,0.8); animation: arrow-blink 1s ease-in-out infinite; }
@keyframes arrow-blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

/* 明细按钮 */
.btn-detail { position: absolute; top: 8px; right: 8px; padding: 4px 12px; background: rgba(0,0,0,0.5); color: #bdc3c7; border: 1px solid #555; border-radius: 6px; font-size: 12px; cursor: pointer; z-index: 10; }
.btn-detail:hover { color: #f1c40f; border-color: #f1c40f; }
.detail-table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 13px; }
.detail-table th, .detail-table td { padding: 5px 8px; border: 1px solid rgba(255,255,255,0.2); text-align: center; }
.detail-table th { background: rgba(255,255,255,0.1); color: #f1c40f; }
.detail-table .pos { color: #2ecc71; }
.detail-table .neg { color: #e74c3c; }
.detail-events { text-align: left; font-size: 12px; color: #bdc3c7; margin-top: 8px; max-height: 120px; overflow-y: auto; }
.detail-events div { padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }

/* 操作按钮 */
.actions { position: absolute; bottom: 130px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 100; }
.actions.hidden { display: none; }
.btn { padding: 8px 24px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.15s; }
.btn-hu { background: linear-gradient(180deg, #e74c3c, #c0392b); color: #fff; }
.btn-gang { background: linear-gradient(180deg, #f39c12, #e67e22); color: #fff; }
.btn-peng { background: linear-gradient(180deg, #3498db, #2980b9); color: #fff; }
.btn-guo { background: linear-gradient(180deg, #95a5a6, #7f8c8d); color: #fff; }
.btn:hover { transform: scale(1.08); filter: brightness(1.1); }
.btn:active { transform: scale(0.96); }

/* 弹窗 */
.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 200; }
.modal.hidden { display: none; }
.modal-box { background: linear-gradient(180deg, #2c3e50, #1a252f); color: #fff; border-radius: 16px; padding: 30px 40px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5); min-width: 320px; }
.modal-box h2 { margin-bottom: 20px; font-size: 22px; }
.modal-box .suit-btns { display: flex; gap: 15px; justify-content: center; margin: 20px 0; }
.suit-btn { width: 80px; height: 80px; border: 3px solid #555; border-radius: 12px; background: rgba(255,255,255,0.1); color: #fff; font-size: 28px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.15s; }
.suit-btn:hover { border-color: #f1c40f; background: rgba(241,196,15,0.2); }
.suit-btn .sl { font-size: 14px; margin-top: 4px; }
.suit-btn.s0 { color: #e74c3c; }
.suit-btn.s1 { color: #27ae60; }
.suit-btn.s2 { color: #2471a3; }

/* 中央信息 */
.center-info { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 16px; text-align: center; pointer-events: none; }
.center-info .remain { font-size: 14px; color: #bdc3c7; }
.center-info .turn-indicator { font-size: 18px; color: #f1c40f; font-weight: bold; margin-bottom: 4px; }

/* 结果弹窗 */
.result-box { min-width: 360px; }
.result-box .winner-info { font-size: 18px; color: #f1c40f; margin: 10px 0; }
.result-box .score-list { text-align: left; margin: 15px 0; }
.result-box .score-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
.result-box .score-change.pos { color: #2ecc71; }
.result-box .score-change.neg { color: #e74c3c; }
.btn-restart { margin-top: 15px; padding: 10px 40px; background: linear-gradient(180deg, #2ecc71, #27ae60); color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
.btn-restart:hover { filter: brightness(1.1); }

/* 提示 */
.toast { position: fixed; top: 20%; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #f1c40f; padding: 10px 30px; border-radius: 8px; font-size: 16px; z-index: 300; transition: opacity 0.3s; pointer-events: none; }
.toast.hidden { opacity: 0; }

/* 新摸的牌 */
.drawn-tile { margin-left: 10px !important; }

/* 横屏适配 */
@media (max-width: 920px) {
  .table { width: 100vw; height: 100vh; border-radius: 0; }
  .tile { width: 32px; height: 44px; }
  .tile .tv { font-size: 15px; }
  .tile .ts { font-size: 10px; }
}
</style>
</head>
<body>
<!-- 启动界面 -->
<div id="splash">
  <div class="bg"></div>
  <div class="overlay"></div>
  <div class="content">
    <div class="logo-icon">🀄</div>
    <div class="title">智麻局</div>
    <div class="subtitle">AI 陪你打麻将</div>
    <div class="tagline">四川血战到底 · 三人对战</div>
    <button class="start-btn" onclick="startGame()">开始游戏</button>
  </div>
  <div class="footer-text">Sichuan Mahjong · Blood Battle</div>
</div>

<div id="game" class="hidden-game">
  <div class="table" id="table">
    <!-- 玩家区域由JS渲染 -->
    <div class="center-info" id="centerInfo"></div>
    <button class="btn-detail" onclick="showScoreDetail()">明细</button>
  </div>
  <div class="actions hidden" id="actions"></div>
  <div class="modal hidden" id="modal"></div>
  <div class="toast hidden" id="toast"></div>
</div>
<script>
// ========== 常量 ==========
const SUITS = ['万', '条', '筒'];
const SUIT_COLORS = ['#c0392b', '#27ae60', '#2471a3'];
const NAMES = ['你', '右家', '对家', '左家'];
const VALUES = ['一', '二', '三', '四', '五', '六', '七', '八', '九'];
const AI_DELAY = 600;
const BaseScore = 1; // 底分，所有结算以此为基础

// ========== 工具函数 ==========
function tileSuit(t) { return Math.floor(t / 9); }
function tileValue(t) { return t % 9 + 1; }
function tileName(t) { return VALUES[t % 9] + SUITS[tileSuit(t)]; }
function tileSort(a, b) { return a - b; }

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function countTiles(tiles) {
  const c = new Array(27).fill(0);
  tiles.forEach(t => c[t]++);
  return c;
}

// ========== 胡牌检测 ==========
function canFormMelds(counts) {
  let i = 0;
  while (i < 27 && counts[i] === 0) i++;
  if (i >= 27) return true;
  // 刻子
  if (counts[i] >= 3) {
    counts[i] -= 3;
    if (canFormMelds(counts)) { counts[i] += 3; return true; }
    counts[i] += 3;
  }
  // 顺子
  const s = Math.floor(i / 9);
  if (i % 9 <= 6 && Math.floor((i+1)/9) === s && Math.floor((i+2)/9) === s &&
      counts[i] >= 1 && counts[i+1] >= 1 && counts[i+2] >= 1) {
    counts[i]--; counts[i+1]--; counts[i+2]--;
    if (canFormMelds(counts)) { counts[i]++; counts[i+1]++; counts[i+2]++; return true; }
    counts[i]++; counts[i+1]++; counts[i+2]++;
  }
  return false;
}

function checkWin(handTiles, missing) {
  // 手牌中不能有缺门的牌
  if (handTiles.some(t => tileSuit(t) === missing)) return false;
  if (handTiles.length % 3 !== 2) return false;
  const counts = countTiles(handTiles);
  // 尝试每种将牌（标准4面子+1雀头）
  for (let i = 0; i < 27; i++) {
    if (counts[i] >= 2) {
      counts[i] -= 2;
      if (canFormMelds(counts)) { counts[i] += 2; return true; }
      counts[i] += 2;
    }
  }
  // 七对子：14张牌，每种牌的数量都是偶数
  if (handTiles.length === 14) {
    let isQiDui = true;
    for (let i = 0; i < 27; i++) {
      if (counts[i] % 2 !== 0) { isQiDui = false; break; }
    }
    if (isQiDui) return true;
  }
  // 十三烂：14张牌，每张都不同，且同花色无三连张
  if (handTiles.length === 14) {
    let isSSL = true;
    for (let i = 0; i < 27; i++) {
      if (counts[i] > 1) { isSSL = false; break; }
    }
    if (isSSL) {
      for (let s = 0; s < 3; s++) {
        for (let v = 0; v <= 6; v++) {
          if (counts[s*9+v] > 0 && counts[s*9+v+1] > 0 && counts[s*9+v+2] > 0) {
            isSSL = false; break;
          }
        }
        if (!isSSL) break;
      }
      if (isSSL) return true;
    }
  }
  return false;
}

// 检查听什么牌
function getTingTiles(handTiles, missing) {
  const ting = [];
  for (let t = 0; t < 27; t++) {
    if (tileSuit(t) === missing) continue;
    const test = [...handTiles, t];
    if (checkWin(test, missing)) ting.push(t);
  }
  return ting;
}

// ========== 番数计算（提取为独立函数，供胡牌和查叫共用） ==========
function calcBaseFan(p, handTiles) {
  let fan = 0;
  let fanDesc = [];
  let hasSpecialType = false;

  const allTiles = [...handTiles];
  p.melds.forEach(m => { for (let i = 0; i < (m.type.includes('gang') ? 4 : 3); i++) allTiles.push(m.tile); });
  const handCounts = countTiles(handTiles);

  // 清一色
  const suits = new Set(allTiles.map(tileSuit).filter(s => s !== p.missing));
  if (suits.size === 1) { fan += 4; fanDesc.push('清一色'); hasSpecialType = true; }

  // 七对 / 龙七对
  if (handTiles.length === 14 && p.melds.length === 0) {
    let isQiDui = true;
    for (let i = 0; i < 27; i++) {
      if (handCounts[i] % 2 !== 0) { isQiDui = false; break; }
    }
    if (isQiDui) {
      let hasQuad = false;
      for (let i = 0; i < 27; i++) {
        if (handCounts[i] === 4) { hasQuad = true; break; }
      }
      if (hasQuad) { fan += 8; fanDesc.push('龙七对'); }
      else { fan += 4; fanDesc.push('七对'); }
      hasSpecialType = true;
    }
  }

  // 十三烂
  if (handTiles.length === 14 && p.melds.length === 0) {
    let isSSL = true;
    for (let i = 0; i < 27; i++) {
      if (handCounts[i] > 1) { isSSL = false; break; }
    }
    if (isSSL) {
      for (let s = 0; s < 3; s++) {
        for (let v = 0; v <= 6; v++) {
          if (handCounts[s*9+v] > 0 && handCounts[s*9+v+1] > 0 && handCounts[s*9+v+2] > 0) {
            isSSL = false; break;
          }
        }
        if (!isSSL) break;
      }
      if (isSSL) { fan += 4; fanDesc.push('十三烂'); hasSpecialType = true; }
    }
  }

  // 金钩钓
  if (handTiles.length === 2 && p.melds.length === 4) {
    fan += 2; fanDesc.push('金钩钓'); hasSpecialType = true;
  }

  // 屁胡
  if (!hasSpecialType) { fan += 1; fanDesc.push('屁胡'); }

  return { fan, fanDesc };
}

// ========== 游戏状态 ==========
const G = {
  wall: [], players: [], dealer: 0, current: 0,
  phase: 'init', // init, choose_missing, play, action_check, ended
  lastDiscard: -1, lastDiscardPlayer: -1,
  drawnTile: -1, // 当前摸到的牌
  lastDiscardedTileInfo: null, // {player, tile} 用于箭头指示
  wonPlayers: new Set(),
  roundScoreChanges: null,
  actionPending: null, // {type, player, tiles}
  totalScores: [0, 0, 0, 0],
  scoreHistory: [], // 每局得分历史
  roundNumber: 0,   // 当前局数
  roundEvents: [],   // 当前局事件记录
};

function initGame() {
  // 创建牌墙
  G.wall = [];
  for (let i = 0; i < 27; i++) for (let j = 0; j < 4; j++) G.wall.push(i);
  shuffle(G.wall);

  G.players = Array.from({length: 4}, () => ({
    hand: [], melds: [], discards: [], missing: -1, won: false, drawCount: 0
  }));
  G.current = G.dealer;
  G.phase = 'init';
  G.lastDiscard = -1;
  G.lastDiscardPlayer = -1;
  G.drawnTile = -1;
  G.lastDiscardedTileInfo = null;
  G.wonPlayers = new Set();
  G.roundScoreChanges = [0, 0, 0, 0];
  G.actionPending = null;
  G.isGangDraw = false;
  G.noInterrupt = true;
  G.isQiangGang = false;
  G.qiangGangInfo = null;
  G.roundNumber++;
  G.roundEvents = [];

  // 发牌
  for (let i = 0; i < 4; i++) {
    for (let j = 0; j < 13; j++) G.players[i].hand.push(G.wall.pop());
    G.players[i].hand.sort(tileSort);
  }
  // 庄家多摸一张
  const extra = G.wall.pop();
  G.players[G.dealer].hand.push(extra);
  G.players[G.dealer].hand.sort(tileSort);
  G.drawnTile = extra;
  G.current = G.dealer;
  G.phase = 'choose_missing';

  renderAll();
  showChooseMissing();
}

// ========== 定缺 ==========
function showChooseMissing() {
  const hand = G.players[0].hand;
  const suitCounts = [0, 0, 0];
  hand.forEach(t => suitCounts[tileSuit(t)]++);

  const modalEl = document.getElementById('modal');
  modalEl.classList.remove('hidden');
  modalEl.innerHTML = `<div class="modal-box">
    <h2>定缺</h2>
    <p style="color:#bdc3c7;margin-bottom:10px;">选择一门花色打缺，手中该花色的牌必须全部打出才能胡牌</p>
    <div class="suit-btns">
      ${SUITS.map((s, i) => `<div class="suit-btn s${i}" onclick="chooseMissing(${i})">
        <span>${s}</span><span class="sl">${suitCounts[i]}张</span>
      </div>`).join('')}
    </div>
  </div>`;
}

function chooseMissing(suit) {
  G.players[0].missing = suit;
  // AI选缺：选张数最少的花色
  for (let i = 1; i < 4; i++) {
    const sc = [0, 0, 0];
    G.players[i].hand.forEach(t => sc[tileSuit(t)]++);
    let minS = 0;
    if (sc[1] < sc[minS]) minS = 1;
    if (sc[2] < sc[minS]) minS = 2;
    G.players[i].missing = minS;
  }
  document.getElementById('modal').classList.add('hidden');
  G.phase = 'play';
  showToast('定缺完成！开始出牌');
  renderAll();

  // 庄家出牌
  if (G.current === 0) {
    // 先检查庄家是否天胡
    if (checkWin(G.players[0].hand, G.players[0].missing)) {
      G.actionPending = { actions: [{ player: 0, type: 'hu_self' }], playerAction: { type: 'hu_self' }, aiActions: [] };
      showActions(['hu', 'guo']);
    }
    // 玩家手动出牌
  } else {
    setTimeout(() => aiTurn(), AI_DELAY);
  }
}

// ========== 出牌逻辑 ==========
function playerDiscard(tileIdx) {
  if (G.phase !== 'play' || G.current !== 0 || G.players[0].won) return;
  const hand = G.players[0].hand;
  if (hand.length % 3 !== 2) return; // 手牌数量不对不能出

  const tile = hand[tileIdx];
  // 检查：如果手中有缺门的牌，必须先出缺门的牌
  const missing = G.players[0].missing;
  const hasMissing = hand.some(t => tileSuit(t) === missing);
  if (hasMissing && tileSuit(tile) !== missing) {
    showToast('必须先打掉缺门的牌！');
    return;
  }

  hand.splice(tileIdx, 1);
  hand.sort(tileSort); // 出牌后立刻整理牌面
  G.players[0].discards.push(tile);
  G.drawnTile = -1;
  G.actionPending = null;
  hideActions();
  afterDiscard(0, tile);
}

function afterDiscard(playerIdx, tile) {
  G.lastDiscard = tile;
  G.lastDiscardPlayer = playerIdx;
  G.lastDiscardedTileInfo = { player: playerIdx, tile: tile };
  renderAll();

  // 检查其他玩家是否能碰/杠/胡
  const actions = checkOtherActions(playerIdx, tile);
  if (actions.length > 0) {
    processActions(actions);
  } else {
    nextTurn();
  }
}

function checkOtherActions(discardPlayer, tile) {
  const actions = [];
  for (let i = 0; i < 4; i++) {
    if (i === discardPlayer || G.players[i].won) continue;
    const p = G.players[i];
    // 定缺的牌不能碰、杠、胡
    if (tileSuit(tile) === p.missing) continue;
    const hand = p.hand;
    const counts = countTiles(hand);
    const tileCount = counts[tile];

    // 胡
    if (p.missing >= 0) {
      const testHand = [...hand, tile];
      if (checkWin(testHand, p.missing)) {
        actions.push({ player: i, type: 'hu', tile, priority: 3 });
      }
    }
    // 杠
    if (tileCount >= 3) {
      actions.push({ player: i, type: 'gang', tile, priority: 2 });
    }
    // 碰
    if (tileCount >= 2) {
      actions.push({ player: i, type: 'peng', tile, priority: 1 });
    }
  }
  // 按优先级排序（胡 > 杠 > 碰）
  actions.sort((a, b) => b.priority - a.priority);
  return actions;
}

function processActions(actions) {
  if (actions.length === 0) { afterActionsResolved(); return; }

  // 找最高优先级的动作
  const topPriority = actions[0].priority;
  const topActions = actions.filter(a => a.priority === topPriority);

  // 如果是玩家的动作
  const playerAction = topActions.find(a => a.player === 0);
  const aiActions = topActions.filter(a => a.player !== 0);

  if (playerAction) {
    // 显示给玩家选择
    const availableTypes = [];
    actions.filter(a => a.player === 0).forEach(a => {
      if (!availableTypes.includes(a.type)) availableTypes.push(a.type);
    });
    availableTypes.push('guo');
    G.actionPending = { actions, playerAction, aiActions };
    showActions(availableTypes);
    return;
  }

  // 只有AI的动作
  setTimeout(() => {
    executeAiAction(topActions[0], actions);
  }, AI_DELAY);
}

function executeAiAction(action, allActions) {
  if (action.type === 'hu') {
    executeHu(action.player, action.tile, false);
    // 检查是否还有其他胡
    const remainHu = allActions.filter(a => a.type === 'hu' && a.player !== action.player);
    remainHu.forEach(a => executeHu(a.player, a.tile, false));
    if (!isGameOver()) afterActionsResolved();
    else endGame();
  } else if (action.type === 'gang') {
    if (aiShouldGang(action.player, action.tile)) {
      executeMingGang(action.player, action.tile);
    } else {
      // 放弃杠，检查碰
      const pengActions = allActions.filter(a => a.type === 'peng' && a.player !== 0);
      if (pengActions.length > 0) {
        executePeng(pengActions[0].player, pengActions[0].tile);
      } else {
        afterActionsResolved();
      }
    }
  } else if (action.type === 'peng') {
    if (aiShouldPeng(action.player, action.tile)) {
      executePeng(action.player, action.tile);
    } else {
      afterActionsResolved();
    }
  }
}

function playerChooseAction(type) {
  hideActions();
  const pending = G.actionPending;
  if (!pending) return;
  G.actionPending = null;

  if (type === 'guo') {
    // 玩家放弃，看AI是否有动作
    const aiActions = pending.aiActions;
    if (aiActions.length > 0) {
      setTimeout(() => executeAiAction(aiActions[0], pending.actions), AI_DELAY);
    } else {
      // 检查更低优先级的AI动作
      const lowerActions = pending.actions.filter(a => a.player !== 0 && a.priority < pending.playerAction.priority);
      if (lowerActions.length > 0) {
        setTimeout(() => executeAiAction(lowerActions[0], pending.actions), AI_DELAY);
      } else {
        afterActionsResolved();
      }
    }
    return;
  }

  const tile = pending.playerAction.tile;
  if (type === 'hu') {
    executeHu(0, tile, false);
    // 其他人也可能胡（一炮多响）
    const otherHu = pending.actions.filter(a => a.type === 'hu' && a.player !== 0);
    otherHu.forEach(a => executeHu(a.player, a.tile, false));
    if (!isGameOver()) afterActionsResolved();
    else endGame();
  } else if (type === 'gang') {
    executeMingGang(0, tile);
  } else if (type === 'peng') {
    executePeng(0, tile);
  }
}

// 动作处理完毕后的路由：抢杠胡回退 vs 正常下一家
function afterActionsResolved() {
  if (G.isQiangGang) {
    completeBugang();
  } else {
    nextTurn();
  }
}

// 抢杠胡被所有人放弃后，完成补杠并摸牌
function completeBugang() {
  const info = G.qiangGangInfo;
  if (!info) { nextTurn(); return; }
  const p = G.players[info.playerIdx];
  if (info.meldIdx >= 0 && p.melds[info.meldIdx]) {
    p.melds[info.meldIdx].type = 'bugang';
  }
  G.isQiangGang = false;
  G.qiangGangInfo = null;
  G.current = info.playerIdx;
  G.isGangDraw = true;
  renderAll();
  setTimeout(() => drawTile(info.playerIdx), AI_DELAY);
}

// 执行胡牌
function executeHu(playerIdx, tile, isSelfDraw) {
  const p = G.players[playerIdx];
  if (!isSelfDraw) {
    p.hand.push(tile);
    p.hand.sort(tileSort);
    // 从出牌者牌河移除
    const dp = G.players[G.lastDiscardPlayer];
    const dIdx = dp.discards.lastIndexOf(tile);
    if (dIdx >= 0) dp.discards.splice(dIdx, 1);
    G.lastDiscardedTileInfo = null;
  }
  p.won = true;
  G.wonPlayers.add(playerIdx);

  // ========== 计算番数（叠加制） ==========
  const { fan: baseFan, fanDesc } = calcBaseFan(p, p.hand);
  let fan = baseFan;

  // --- 额外番种（叠加） ---

  // 天胡：庄家起手14张直接胡牌
  if (playerIdx === G.dealer && p.drawCount === 0 && isSelfDraw) {
    fan += 8; fanDesc.push('天胡');
  }

  // 地胡：闲家第一轮摸牌即胡
  if (playerIdx !== G.dealer && isSelfDraw && p.drawCount === 1 && G.noInterrupt) {
    fan += 8; fanDesc.push('地胡');
  }

  // 自摸
  if (isSelfDraw) { fan += 1; fanDesc.push('自摸'); }

  // 杠上开花：杠后摸到的牌正好胡牌（算自摸，额外+1番）
  if (isSelfDraw && G.isGangDraw) { fan += 1; fanDesc.push('杠上开花'); }

  // 抢杠胡：别人补杠时你胡了那张牌（视为点炮，额外+1番）
  if (!isSelfDraw && G.isQiangGang) { fan += 1; fanDesc.push('抢杠胡'); }

  // ========== 计分：BaseScore × 2^番 ==========
  const totalScore = BaseScore * Math.pow(2, fan);
  const desc = fanDesc.join('+');

  if (isSelfDraw) {
    // 自摸：总分由剩余未胡玩家平均分摊
    const payers = [];
    for (let i = 0; i < 4; i++) {
      if (i !== playerIdx && !G.players[i].won) payers.push(i);
    }
    const numPayers = payers.length;
    if (numPayers > 0) {
      const perPayer = Math.floor(totalScore / numPayers);
      const remainder = totalScore % numPayers;
      payers.forEach((payerIdx, idx) => {
        const pay = perPayer + (idx < remainder ? 1 : 0);
        G.roundScoreChanges[payerIdx] -= pay;
        G.roundScoreChanges[playerIdx] += pay;
      });
    }
    const perShow = numPayers > 0 ? Math.floor(totalScore / numPayers) : 0;
    showToast(`${NAMES[playerIdx]} 自摸胡牌！(${desc} ${fan}番 总${totalScore}分 每家约${perShow}分)`);
    G.roundEvents.push(`${NAMES[playerIdx]} 自摸胡牌 (${desc} ${fan}番) 总${totalScore}分`);
  } else {
    // 点炮：由点炮者单独支付全部
    const payer = G.lastDiscardPlayer;
    G.roundScoreChanges[payer] -= totalScore;
    G.roundScoreChanges[playerIdx] += totalScore;
    showToast(`${NAMES[playerIdx]} 胡牌！${NAMES[payer]}点炮 (${desc} ${fan}番 ${totalScore}分)`);
    G.roundEvents.push(`${NAMES[playerIdx]} 胡牌 ${NAMES[payer]}点炮 (${desc} ${fan}番) ${totalScore}分`);
  }

  G.isGangDraw = false;
  G.isQiangGang = false;
  renderAll();
}

// 执行明杠
function executeMingGang(playerIdx, tile) {
  const p = G.players[playerIdx];
  // 从手牌移除3张
  for (let n = 0; n < 3; n++) {
    const idx = p.hand.indexOf(tile);
    if (idx >= 0) p.hand.splice(idx, 1);
  }
  // 从出牌者牌河移除
  const dp = G.players[G.lastDiscardPlayer];
  const dIdx = dp.discards.lastIndexOf(tile);
  if (dIdx >= 0) dp.discards.splice(dIdx, 1);

  const fromPlayer = G.lastDiscardPlayer;
  p.melds.push({ type: 'minggang', tile, from: fromPlayer });
  G.lastDiscard = -1;
  G.lastDiscardPlayer = -1;
  G.lastDiscardedTileInfo = null;

  // 明杠分：放杠者付1×BaseScore（即时结算）
  const mgScore = 1 * BaseScore;
  G.roundScoreChanges[fromPlayer] -= mgScore;
  G.roundScoreChanges[playerIdx] += mgScore;
  G.roundEvents.push(`${NAMES[playerIdx]} 明杠${tileName(tile)} (${NAMES[fromPlayer]}付${mgScore}分)`);

  showToast(`${NAMES[playerIdx]} 明杠！`);
  G.current = playerIdx;
  G.noInterrupt = false;
  renderAll();

  // 杠后摸牌（标记杠上开花）
  G.isGangDraw = true;
  setTimeout(() => drawTile(playerIdx), AI_DELAY);
}

// 执行碰
function executePeng(playerIdx, tile) {
  const p = G.players[playerIdx];
  // 从手牌移除2张
  for (let n = 0; n < 2; n++) {
    const idx = p.hand.indexOf(tile);
    if (idx >= 0) p.hand.splice(idx, 1);
  }
  // 从出牌者牌河移除
  const dp = G.players[G.lastDiscardPlayer];
  const dIdx = dp.discards.lastIndexOf(tile);
  if (dIdx >= 0) dp.discards.splice(dIdx, 1);

  p.melds.push({ type: 'peng', tile, from: G.lastDiscardPlayer });
  G.lastDiscard = -1;
  G.lastDiscardPlayer = -1;
  G.lastDiscardedTileInfo = null;

  showToast(`${NAMES[playerIdx]} 碰！`);
  G.current = playerIdx;
  G.noInterrupt = false;
  p.hand.sort(tileSort);
  renderAll();

  // 碰后需要出牌
  if (playerIdx === 0) {
    // 等玩家出牌（手牌已可点击）
  } else {
    setTimeout(() => aiDiscard(playerIdx), AI_DELAY);
  }
}

// 下一个玩家
function nextTurn() {
  G.lastDiscard = -1;
  G.lastDiscardPlayer = -1;
  G.isGangDraw = false;
  let next = (G.current + 1) % 4;
  let attempts = 0;
  while (G.players[next].won && attempts < 4) {
    next = (next + 1) % 4;
    attempts++;
  }
  if (attempts >= 4 || isGameOver()) { endGame(); return; }
  G.current = next;
  drawTile(next);
}

// 摸牌
function drawTile(playerIdx) {
  if (G.wall.length === 0) { endGame(); return; }
  if (isGameOver()) { endGame(); return; }

  const tile = G.wall.pop();
  const p = G.players[playerIdx];
  p.hand.push(tile);
  p.drawCount++;
  G.drawnTile = tile;

  // 玩家0：新摸的牌放最右，其余排序
  if (playerIdx === 0) {
    const drawn = p.hand.pop();
    p.hand.sort(tileSort);
    p.hand.push(drawn);
  } else {
    p.hand.sort(tileSort);
  }
  renderAll();

  // 检查自摸
  if (checkWin(p.hand, p.missing)) {
    if (playerIdx === 0) {
      G.actionPending = { actions: [{ player: 0, type: 'hu_self' }], playerAction: { type: 'hu_self' }, aiActions: [] };
      showActions(['hu', 'guo']);
      return;
    } else {
      // AI自摸
      executeHu(playerIdx, tile, true);
      if (!isGameOver()) { setTimeout(() => nextTurn(), AI_DELAY); }
      else { endGame(); }
      return;
    }
  }

  // 检查暗杠/补杠
  const gangOptions = checkSelfGang(playerIdx);

  if (playerIdx === 0) {
    // 玩家回合
    if (gangOptions.length > 0) {
      const types = ['guo'];
      if (gangOptions.some(g => g.type === 'angang' || g.type === 'bugang')) types.unshift('gang');
      // 暂存杠选项
      G.actionPending = { gangOptions, player: 0 };
      showActions(types);
    }
    G.isGangDraw = false;
    renderAll();
  } else {
    setTimeout(() => {
      // AI检查杠
      if (gangOptions.length > 0 && aiShouldSelfGang(playerIdx, gangOptions[0])) {
        executeSelfGang(playerIdx, gangOptions[0]);
      } else {
        G.isGangDraw = false;
        aiDiscard(playerIdx);
      }
    }, AI_DELAY);
  }
}

function checkSelfGang(playerIdx) {
  const p = G.players[playerIdx];
  const counts = countTiles(p.hand);
  const options = [];
  // 暗杠
  for (let t = 0; t < 27; t++) {
    if (counts[t] >= 4 && tileSuit(t) !== p.missing) {
      options.push({ type: 'angang', tile: t });
    }
  }
  // 补杠（碰过的牌，手里又有一张）
  p.melds.forEach(m => {
    if (m.type === 'peng' && counts[m.tile] >= 1 && tileSuit(m.tile) !== p.missing) {
      options.push({ type: 'bugang', tile: m.tile });
    }
  });
  return options;
}

function executeSelfGang(playerIdx, gangOption) {
  const p = G.players[playerIdx];
  if (gangOption.type === 'angang') {
    for (let n = 0; n < 4; n++) {
      const idx = p.hand.indexOf(gangOption.tile);
      if (idx >= 0) p.hand.splice(idx, 1);
    }
    p.melds.push({ type: 'angang', tile: gangOption.tile });
    // 暗杠分：每家付2×BaseScore（即时结算）
    const agScore = 2 * BaseScore;
    for (let i = 0; i < 4; i++) {
      if (i !== playerIdx && !G.players[i].won) {
        G.roundScoreChanges[i] -= agScore;
        G.roundScoreChanges[playerIdx] += agScore;
      }
    }
    showToast(`${NAMES[playerIdx]} 暗杠！`);
    G.roundEvents.push(`${NAMES[playerIdx]} 暗杠${tileName(gangOption.tile)} (每家付${agScore}分)`);
    G.noInterrupt = false;
    G.drawnTile = -1;
    renderAll();
    // 杠后摸牌（标记杠上开花）
    G.isGangDraw = true;
    setTimeout(() => drawTile(playerIdx), AI_DELAY);
  } else { // 补杠
    const tile = gangOption.tile;
    const idx = p.hand.indexOf(tile);
    if (idx >= 0) p.hand.splice(idx, 1);
    const meldIdx = p.melds.findIndex(m => m.type === 'peng' && m.tile === tile);

    // 补杠分：每家付1×BaseScore（先即时结算，即使被抢杠也要付）
    const bgScore = 1 * BaseScore;
    for (let i = 0; i < 4; i++) {
      if (i !== playerIdx && !G.players[i].won) {
        G.roundScoreChanges[i] -= bgScore;
        G.roundScoreChanges[playerIdx] += bgScore;
      }
    }
    showToast(`${NAMES[playerIdx]} 补杠！`);
    G.roundEvents.push(`${NAMES[playerIdx]} 补杠${tileName(tile)} (每家付${bgScore}分)`);
    G.noInterrupt = false;

    // 检查抢杠胡：其他玩家能否胡这张牌
    const qgActions = [];
    for (let i = 0; i < 4; i++) {
      if (i === playerIdx || G.players[i].won) continue;
      if (tileSuit(tile) === G.players[i].missing) continue;
      const testHand = [...G.players[i].hand, tile];
      if (checkWin(testHand, G.players[i].missing)) {
        qgActions.push({ player: i, type: 'hu', tile, priority: 3 });
      }
    }

    if (qgActions.length > 0) {
      // 有人可以抢杠胡，暂不完成补杠
      G.qiangGangInfo = { playerIdx, tile, meldIdx };
      G.lastDiscard = tile;
      G.lastDiscardPlayer = playerIdx;
      G.isQiangGang = true;
      renderAll();
      processActions(qgActions);
      return;
    }

    // 无人抢杠，正常完成补杠
    if (meldIdx >= 0) p.melds[meldIdx].type = 'bugang';
    G.drawnTile = -1;
    renderAll();
    // 杠后摸牌（标记杠上开花）
    G.isGangDraw = true;
    setTimeout(() => drawTile(playerIdx), AI_DELAY);
  }
}

function playerChooseSelfAction(type) {
  hideActions();
  const pending = G.actionPending;
  if (!pending) return;
  G.actionPending = null;

  if (type === 'hu') {
    executeHu(0, G.drawnTile, true);
    if (!isGameOver()) setTimeout(() => nextTurn(), AI_DELAY);
    else endGame();
  } else if (type === 'gang' && pending.gangOptions) {
    executeSelfGang(0, pending.gangOptions[0]);
  }
  // guo就什么都不做，等玩家出牌
}

function isGameOver() {
  if (G.wall.length === 0) return true;
  const active = [0,1,2,3].filter(i => !G.players[i].won);
  return active.length <= 1;
}

function endGame() {
  G.phase = 'ended';

  // 查叫结算：牌墙摸完时对未听牌者进行赔付
  if (G.wall.length === 0) {
    settleChaZhao();
  }

  for (let i = 0; i < 4; i++) G.totalScores[i] += G.roundScoreChanges[i];
  // 保存本局历史
  G.scoreHistory.push({
    round: G.roundNumber,
    changes: [...G.roundScoreChanges],
    events: [...G.roundEvents],
    totals: [...G.totalScores]
  });
  renderAll();
  showResult();
}

// ========== 查叫结算 ==========
function settleChaZhao() {
  const listeners = [];   // 听牌者 {idx, maxFan}
  const nonListeners = []; // 未听牌者

  for (let i = 0; i < 4; i++) {
    if (G.players[i].won) continue; // 已胡不参与查叫
    const p = G.players[i];

    // 未定缺视为未听
    if (p.missing < 0) { nonListeners.push(i); continue; }

    // 手中还有缺门牌未打完，不满足缺一门条件，视为未听
    const hasMissingTiles = p.hand.some(t => tileSuit(t) === p.missing);
    if (hasMissingTiles) { nonListeners.push(i); continue; }

    // 检查是否听牌
    const tingTiles = getTingTiles(p.hand, p.missing);
    if (tingTiles.length === 0) {
      nonListeners.push(i);
    } else {
      // 计算最大番数（假设自摸胡牌，按最大可能番型计算）
      let maxFan = 0;
      let maxDesc = '';
      for (const t of tingTiles) {
        const testHand = [...p.hand, t];
        const { fan: baseFan, fanDesc } = calcBaseFan(p, testHand);
        const totalFan = baseFan + 1; // +1 自摸
        if (totalFan > maxFan) {
          maxFan = totalFan;
          maxDesc = fanDesc.join('+') + '+自摸';
        }
      }
      listeners.push({ idx: i, maxFan, maxDesc });
    }
  }

  // 未叫者向每位叫者赔付
  if (listeners.length > 0 && nonListeners.length > 0) {
    for (const listener of listeners) {
      const score = BaseScore * Math.pow(2, listener.maxFan);
      for (const nlIdx of nonListeners) {
        G.roundScoreChanges[nlIdx] -= score;
        G.roundScoreChanges[listener.idx] += score;
      }
      G.roundEvents.push(`查叫: ${NAMES[listener.idx]}听牌(${listener.maxDesc} ${listener.maxFan}番), 未叫者各付${score}分`);
    }
    showToast('流局 - 查叫结算！');
  } else if (listeners.length === 0 && nonListeners.length > 0) {
    // 无人听牌，无人赔付
    showToast('流局 - 无人听牌');
  }
}

// ========== AI 逻辑 ==========
function aiDiscard(playerIdx) {
  const p = G.players[playerIdx];
  p.hand.sort(tileSort);
  const tile = aiChooseDiscard(playerIdx);
  const idx = p.hand.indexOf(tile);
  if (idx >= 0) p.hand.splice(idx, 1);
  p.discards.push(tile);
  G.drawnTile = -1;
  afterDiscard(playerIdx, tile);
}

function aiChooseDiscard(playerIdx) {
  const p = G.players[playerIdx];
  const hand = p.hand;
  const missing = p.missing;

  // 1. 先出缺门的牌
  const missingTiles = hand.filter(t => tileSuit(t) === missing);
  if (missingTiles.length > 0) {
    return missingTiles[0]; // 出缺门中最小的
  }

  // 2. 评估每张牌的价值
  let bestDiscard = hand[0];
  let bestScore = Infinity;

  for (const tile of hand) {
    let score = evaluateTileKeepValue(hand, tile, missing);
    if (score < bestScore) {
      bestScore = score;
      bestDiscard = tile;
    }
  }
  return bestDiscard;
}

function evaluateTileKeepValue(hand, tile, missing) {
  const counts = countTiles(hand);
  const t = tile;
  const s = tileSuit(t);
  const v = t % 9;
  if (s === missing) return -100; // 缺门的牌价值最低

  let score = 0;
  // 对子/刻子价值高
  score += (counts[t] - 1) * 30;
  // 相邻牌（顺子潜力）
  if (v > 0 && counts[t-1] > 0 && tileSuit(t-1) === s) score += 15;
  if (v < 8 && counts[t+1] > 0 && tileSuit(t+1) === s) score += 15;
  if (v > 1 && counts[t-2] > 0 && tileSuit(t-2) === s) score += 8;
  if (v < 7 && counts[t+2] > 0 && tileSuit(t+2) === s) score += 8;
  // 中张价值高于边张
  if (v >= 2 && v <= 6) score += 5;
  return score;
}

function aiShouldPeng(playerIdx, tile) {
  if (tileSuit(tile) === G.players[playerIdx].missing) return false;
  // 简单策略：大多数情况碰
  return true;
}

function aiShouldGang(playerIdx, tile) {
  if (tileSuit(tile) === G.players[playerIdx].missing) return false;
  return true;
}

function aiShouldSelfGang(playerIdx, option) {
  return true;
}

function aiTurn() {
  if (G.phase !== 'play' || G.players[G.current].won) { nextTurn(); return; }
  const p = G.players[G.current];
  if (p.hand.length % 3 === 2) {
    // 庄家第一手14张，检查天胡
    if (checkWin(p.hand, p.missing)) {
      executeHu(G.current, G.drawnTile, true);
      if (!isGameOver()) setTimeout(() => nextTurn(), AI_DELAY);
      else endGame();
      return;
    }
    aiDiscard(G.current);
  } else {
    drawTile(G.current);
  }
}

// ========== UI 渲染 ==========
const NUMS = ['一','二','三','四','五','六','七','八','九'];

function createTileHTML(t, cls = '', onclick = '') {
  const s = tileSuit(t), v = tileValue(t);
  const clickAttr = onclick ? `onclick="${onclick}"` : '';
  return `<div class="tile ${cls}" ${clickAttr}><div class="tf s${s}"><b class="tn">${NUMS[v-1]}</b><b class="ts">${SUITS[s]}</b></div></div>`;
}

function createBackTileHTML(cls = '') {
  return `<div class="tile back ${cls}"></div>`;
}

function renderAll() {
  const table = document.getElementById('table');
  // 清除已有的玩家区域、弃牌区和箭头
  table.querySelectorAll('.player-area, .discard-area, .turn-arrow').forEach(el => el.remove());

  renderPlayer0(table);
  renderPlayer1(table);
  renderPlayer2(table);
  renderPlayer3(table);
  renderCenterInfo();

  // 渲染出牌指示箭头 - 指向最后出的那张牌顶部
  if (G.lastDiscardedTileInfo && G.phase === 'play') {
    const discClasses = ['discard-bottom', 'discard-right', 'discard-top', 'discard-left'];
    const discArea = table.querySelector('.' + discClasses[G.lastDiscardedTileInfo.player]);
    if (discArea) {
      const tiles = discArea.querySelectorAll('.tile');
      const lastTile = tiles[tiles.length - 1];
      if (lastTile) {
        const tableRect = table.getBoundingClientRect();
        const tileRect = lastTile.getBoundingClientRect();
        const arrowEl = document.createElement('div');
        arrowEl.className = 'turn-arrow';
        arrowEl.textContent = '▼';
        arrowEl.style.left = (tileRect.left - tableRect.left + tileRect.width / 2) + 'px';
        arrowEl.style.top = (tileRect.top - tableRect.top - 22) + 'px';
        arrowEl.style.transform = 'translateX(-50%)';
        table.appendChild(arrowEl);
      }
    }
  }
}

function renderPlayer0(table) {
  const p = G.players[0];
  const div = document.createElement('div');
  div.className = 'player-area player-bottom';

  // 信息栏
  let infoHTML = `<div class="player-info"><span class="name">${NAMES[0]}</span><span class="score">分数: ${G.totalScores[0] + G.roundScoreChanges[0]}</span>`;
  if (p.missing >= 0) infoHTML += `<span class="missing-icon">缺${SUITS[p.missing]}</span>`;
  if (p.won) infoHTML += ` <span style="color:#2ecc71">✓胡</span>`;
  infoHTML += `</div>`;

  // 副露
  let meldsHTML = '<div class="melds">';
  p.melds.forEach(m => {
    meldsHTML += '<div class="meld">';
    const count = m.type.includes('gang') ? 4 : 3;
    for (let i = 0; i < count; i++) {
      const cls = (m.type === 'angang' && i > 0 && i < 3) ? 'back small' : 'small';
      meldsHTML += m.type === 'angang' && i > 0 && i < 3 ? createBackTileHTML('small') : createTileHTML(m.tile, 'small');
    }
    meldsHTML += '</div>';
  });
  meldsHTML += '</div>';

  // 手牌
  let handHTML = '<div class="hand">';
  const isMyTurn = G.current === 0 && G.phase === 'play' && !p.won;
  p.hand.forEach((t, i) => {
    const isDrawn = (i === p.hand.length - 1 && G.drawnTile >= 0 && t === G.drawnTile && p.hand.length % 3 === 2);
    const cls = (isMyTurn && p.hand.length % 3 === 2 ? 'clickable' : '') + (isDrawn ? ' drawn-tile' : '');
    const click = isMyTurn && p.hand.length % 3 === 2 ? `playerDiscard(${i})` : '';
    handHTML += createTileHTML(t, cls, click);
  });
  handHTML += '</div>';

  div.innerHTML = infoHTML + '<div style="display:flex;align-items:flex-end;">' + meldsHTML + handHTML + '</div>';
  table.appendChild(div);

  // 弃牌
  const discDiv = document.createElement('div');
  discDiv.className = 'discard-area discard-bottom';
  p.discards.forEach(t => discDiv.innerHTML += createTileHTML(t, 'tiny'));
  table.appendChild(discDiv);
}

function renderOtherPlayer(table, idx, posClass, discClass) {
  const p = G.players[idx];
  const div = document.createElement('div');
  div.className = `player-area ${posClass}`;
  const isSide = posClass.includes('left') || posClass.includes('right');
  const rotCls = posClass.includes('left') ? ' rot-cw' : posClass.includes('right') ? ' rot-ccw' : '';
  const tileSize = isSide ? 'tiny' + rotCls : 'small';

  let infoHTML = `<div class="player-info"><span class="name">${NAMES[idx]}</span><span class="score">${G.totalScores[idx] + G.roundScoreChanges[idx]}分</span>`;
  if (p.missing >= 0) infoHTML += `<span class="missing-icon">缺${SUITS[p.missing]}</span>`;
  if (p.won) infoHTML += ` <span style="color:#2ecc71">✓胡</span>`;
  if (G.current === idx && G.phase === 'play' && !p.won) infoHTML += ` <span style="color:#f1c40f">◆</span>`;
  infoHTML += `</div>`;

  const meldCls = isSide ? 'melds-side' : 'melds';
  const meldItemCls = isSide ? 'meld-side' : 'meld';
  let meldsHTML = `<div class="${meldCls}">`;
  p.melds.forEach(m => {
    meldsHTML += `<div class="${meldItemCls}">`;
    const count = m.type.includes('gang') ? 4 : 3;
    for (let i = 0; i < count; i++) {
      meldsHTML += createTileHTML(m.tile, tileSize);
    }
    meldsHTML += '</div>';
  });
  meldsHTML += '</div>';

  const handCls = isSide ? 'hand-side' : 'hand';
  let handHTML = `<div class="${handCls}">`;
  const showHand = G.phase === 'ended';
  p.hand.forEach(t => {
    handHTML += showHand ? createTileHTML(t, tileSize) : createBackTileHTML(tileSize);
  });
  handHTML += '</div>';

  if (isSide) {
    div.innerHTML = infoHTML + meldsHTML + handHTML;
  } else {
    div.innerHTML = infoHTML + '<div style="display:flex;align-items:flex-end;">' + meldsHTML + handHTML + '</div>';
  }
  table.appendChild(div);

  const discDiv = document.createElement('div');
  discDiv.className = `discard-area ${discClass}`;
  const discTileCls = 'tiny' + rotCls;
  p.discards.forEach(t => discDiv.innerHTML += createTileHTML(t, discTileCls));
  table.appendChild(discDiv);
}

function renderPlayer1(table) { renderOtherPlayer(table, 1, 'player-right', 'discard-right'); }
function renderPlayer2(table) { renderOtherPlayer(table, 2, 'player-top', 'discard-top'); }
function renderPlayer3(table) { renderOtherPlayer(table, 3, 'player-left', 'discard-left'); }

function renderCenterInfo() {
  const el = document.getElementById('centerInfo');
  let html = '';
  if (G.phase === 'play' || G.phase === 'choose_missing') {
    html += `<div class="remain">剩余 ${G.wall.length} 张牌</div>`;
  }
  if (G.phase === 'play' && !G.players[0].won) {
    if (G.current === 0 && G.players[0].hand.length % 3 === 2) {
      html += `<div class="turn-indicator">请出牌</div>`;
    } else if (G.current !== 0) {
      html += `<div class="turn-indicator">${NAMES[G.current]}思考中...</div>`;
    }
  }
  // 听牌提示：当玩家手牌为3k+1时显示
  if (G.phase === 'play' && !G.players[0].won && G.players[0].missing >= 0) {
    const p = G.players[0];
    if (p.hand.length % 3 === 1) {
      const ting = getTingTiles(p.hand, p.missing);
      if (ting.length > 0) {
        html += `<div style="color:#2ecc71;font-size:13px;margin-top:4px;">听牌: ${ting.map(tileName).join(' ')}</div>`;
      }
    }
  }
  el.innerHTML = html;
}

// ========== 操作按钮 ==========
function showActions(types) {
  const el = document.getElementById('actions');
  el.classList.remove('hidden');
  el.innerHTML = types.map(t => {
    const labels = { hu: '胡', gang: '杠', peng: '碰', guo: '过' };
    const cls = `btn btn-${t}`;
    return `<button class="${cls}" onclick="handleAction('${t}')">${labels[t]}</button>`;
  }).join('');
}

function hideActions() {
  document.getElementById('actions').classList.add('hidden');
  document.getElementById('actions').innerHTML = '';
}

function handleAction(type) {
  const pending = G.actionPending;
  if (!pending) { hideActions(); return; }

  if (pending.actions && pending.actions[0] && pending.actions[0].type === 'hu_self') {
    playerChooseSelfAction(type);
  } else if (pending.gangOptions) {
    playerChooseSelfAction(type);
  } else {
    playerChooseAction(type);
  }
}

// ========== 提示 ==========
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.remove('hidden');
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.add('hidden'), 1500);
}

// ========== 结果弹窗 ==========
function showResult() {
  const modal = document.getElementById('modal');
  modal.classList.remove('hidden');

  let winnersText = '';
  G.wonPlayers.forEach(i => winnersText += `${NAMES[i]} `);
  if (G.wonPlayers.size === 0) winnersText = '流局（无人胡牌）';

  let scoresHTML = '';
  for (let i = 0; i < 4; i++) {
    const change = G.roundScoreChanges[i];
    const cls = change > 0 ? 'pos' : change < 0 ? 'neg' : '';
    scoresHTML += `<div class="score-item">
      <span>${NAMES[i]}</span>
      <span class="score-change ${cls}">${change >= 0 ? '+' : ''}${change} (总: ${G.totalScores[i]})</span>
    </div>`;
  }

  modal.innerHTML = `<div class="modal-box result-box">
    <h2>本局结束</h2>
    <div class="winner-info">${winnersText}</div>
    <div class="score-list">${scoresHTML}</div>
    <button class="btn-restart" onclick="showScoreDetail()" style="background:linear-gradient(180deg,#3498db,#2980b9);margin-right:10px;">查看明细</button>
    <button class="btn-restart" onclick="restartGame()">再来一局</button>
  </div>`;
}

function restartGame() {
  document.getElementById('modal').classList.add('hidden');
  G.dealer = (G.dealer + 1) % 4;
  G.roundScoreChanges = [0, 0, 0, 0];
  initGame();
}

// ========== 明细弹窗 ==========
function showScoreDetail() {
  const modal = document.getElementById('modal');
  modal.classList.remove('hidden');

  if (G.scoreHistory.length === 0) {
    modal.innerHTML = `<div class="modal-box">
      <h2>得分明细</h2>
      <p style="color:#bdc3c7;margin:20px 0;">暂无历史记录</p>
      <button class="btn-restart" onclick="closeDetailModal()">关闭</button>
    </div>`;
    return;
  }

  // 构建总分表
  let tableHTML = '<table class="detail-table"><thead><tr><th>局数</th>';
  for (let i = 0; i < 4; i++) tableHTML += `<th>${NAMES[i]}</th>`;
  tableHTML += '</tr></thead><tbody>';

  for (const h of G.scoreHistory) {
    tableHTML += `<tr><td>第${h.round}局</td>`;
    for (let i = 0; i < 4; i++) {
      const v = h.changes[i];
      const cls = v > 0 ? 'pos' : v < 0 ? 'neg' : '';
      tableHTML += `<td class="${cls}">${v >= 0 ? '+' : ''}${v}</td>`;
    }
    tableHTML += '</tr>';
  }

  // 累计行
  tableHTML += '<tr style="font-weight:bold;border-top:2px solid rgba(255,255,255,0.3);"><td>累计</td>';
  const lastTotals = G.scoreHistory[G.scoreHistory.length - 1].totals;
  for (let i = 0; i < 4; i++) {
    const v = lastTotals[i];
    const cls = v > 0 ? 'pos' : v < 0 ? 'neg' : '';
    tableHTML += `<td class="${cls}">${v >= 0 ? '+' : ''}${v}</td>`;
  }
  tableHTML += '</tr></tbody></table>';

  // 事件明细
  let eventsHTML = '';
  for (const h of G.scoreHistory) {
    if (h.events.length > 0) {
      eventsHTML += `<div style="color:#f1c40f;margin-top:6px;font-size:12px;">第${h.round}局:</div>`;
      h.events.forEach(e => eventsHTML += `<div>${e}</div>`);
    }
  }

  modal.innerHTML = `<div class="modal-box" style="min-width:420px;max-height:80vh;overflow-y:auto;">
    <h2>得分明细</h2>
    ${tableHTML}
    <div class="detail-events">${eventsHTML}</div>
    <button class="btn-restart" onclick="closeDetailModal()" style="margin-top:15px;">关闭</button>
  </div>`;
}

function closeDetailModal() {
  const modal = document.getElementById('modal');
  if (G.phase === 'ended') {
    showResult();
  } else {
    modal.classList.add('hidden');
  }
}

// ========== 启动 ==========
function startGame() {
  const splash = document.getElementById('splash');
  const game = document.getElementById('game');
  splash.classList.add('fade-out');
  setTimeout(() => {
    splash.style.display = 'none';
    game.classList.remove('hidden-game');
    initGame();
  }, 600);
}
</script>
